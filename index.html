<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="论文每日一读：一个记录论文阅读、筛选和历史回看的研究面板。"
    />
    <title>论文每日一读</title>
    <link rel="preload" href="assets/study-buddies.png" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar" aria-label="站点导航">
        <a class="brand" href="./" aria-label="论文每日一读首页">
          <span class="brand-mark">读</span>
          <span>
            <strong>论文每日一读</strong>
            <small>RecSys & Inference Radar</small>
          </span>
        </a>

        <div class="topbar-actions">
          <nav class="site-switcher" aria-label="内容导航">
            <a class="site-switcher-link" href="./" aria-current="page">论文</a>
            <a class="site-switcher-link" href="textbooks/">经典教材导读</a>
          </nav>
          <button class="icon-button" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <i data-lucide="moon"></i>
          </button>
        </div>
      </header>

      <main>
        <section class="masthead" aria-labelledby="page-title">
          <div class="masthead-copy">
            <p class="eyebrow" id="todayLabel">Today</p>
            <h1 id="page-title">论文每日一读</h1>
            <p class="lede">
              记录想读和读过的论文，支持搜索、筛选、收藏待读，也能回看历史日期里的论文列表。
            </p>
            <dl class="metric-row" aria-label="今日摘要">
              <div>
                <dt>收录</dt>
                <dd id="paperCount">0</dd>
              </div>
              <div>
                <dt>领域</dt>
                <dd id="areaCount">0</dd>
              </div>
              <div>
                <dt>更新</dt>
                <dd id="updatedAt">-</dd>
              </div>
              <div>
                <dt>历史</dt>
                <dd id="historyCount">0</dd>
              </div>
            </dl>
          </div>
          <figure class="masthead-media">
            <img src="assets/study-buddies.png" alt="两只可爱小狗在电脑前一起学习和做笔记" />
          </figure>
        </section>

        <section class="control-strip" aria-label="筛选论文">
          <div class="history-bar" aria-label="历史日期">
            <label class="history-select">
              <span>历史记录</span>
              <select id="historySelect"></select>
            </label>
            <div class="history-quick" id="historyQuick" aria-label="最近日期"></div>
          </div>

          <div class="search-box">
            <i data-lucide="search"></i>
            <input id="searchInput" type="search" autocomplete="off" placeholder="搜索标题、作者、摘要或标签" />
          </div>

          <div class="filter-row">
            <div class="segment-group" id="areaFilters" role="list" aria-label="领域筛选"></div>

            <div class="sort-tools">
              <label class="select-field">
                <span>排序</span>
                <select id="sortSelect">
                  <option value="priority">推荐优先</option>
                  <option value="fresh">最新优先</option>
                  <option value="signal">信号最高</option>
                  <option value="short">短摘要</option>
                </select>
              </label>

              <button class="quiet-button" id="bookmarkFilter" type="button" aria-pressed="false">
                <i data-lucide="bookmark"></i>
                <span>收藏</span>
              </button>
            </div>
          </div>
        </section>

        <section class="content-grid" aria-label="论文列表">
          <aside class="digest-panel" aria-label="阅读摘要">
            <div class="panel-header">
              <span>Digest</span>
              <i data-lucide="sparkles"></i>
            </div>
            <ol id="digestList"></ol>
          </aside>

          <div>
            <div class="list-heading">
              <h2 id="resultsTitle">今日论文</h2>
              <span id="resultCount">0 results</span>
            </div>
            <div class="paper-list" id="paperList"></div>
            <div class="empty-state" id="emptyState" hidden>
              <i data-lucide="search-x"></i>
              <h2>没有匹配的论文</h2>
              <p>换个关键词或领域试试。</p>
            </div>
          </div>
        </section>

        <section class="comments-section" aria-labelledby="comments-title">
          <div class="comments-heading">
            <div>
              <p class="eyebrow">GitHub</p>
              <h2 id="comments-title">评论</h2>
            </div>
            <a class="comments-source" href="https://github.com/1170300504/daily-paper/issues" target="_blank" rel="noreferrer">
              <i data-lucide="github"></i>
              <span>Issues</span>
            </a>
          </div>
          <div class="comments-thread" id="commentsThread"></div>
        </section>
      </main>

      <footer class="site-footer">
        <span>论文每日一读 · 1170300504/daily-paper</span>
        <a href="data/history.json">history.json</a>
      </footer>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
